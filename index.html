<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級打字王</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        .char { position: relative; display: inline-block; transition: all 0.2s; border-bottom: 2px solid transparent; min-width: 0.6em; }
        .char.current { border-bottom-color: #3b82f6; background-color: #dbeafe; }
        .char.correct { color: #10b981; }
        .char.incorrect { color: #ef4444; background-color: #fee2e2; }
        .char.pending { color: #9ca3af; }
        .char.newline::after { content: "⏎"; font-size: 0.8em; margin-left: 2px; opacity: 0.7; }
        #text-display { line-height: 1.8; letter-spacing: 0.05em; font-size: 1.5rem; word-break: break-all; white-space: pre-wrap; font-family: ui-monospace, Consolas, monospace; }
        .glass-morphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .my-rank-highlight { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { border-color: #6366f1; } 50% { border-color: #a5b4fc; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

<div id="app" class="max-w-5xl mx-auto p-4 md:p-8">
    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-bold text-indigo-600">⌨️ 班級打字字詞賽</h1>
            <p id="room-status" class="text-sm text-slate-500 italic">正在載入設定...</p>
        </div>
        <button id="admin-toggle" class="text-slate-400 hover:text-indigo-500 text-xs underline">教師模式</button>
    </header>

    <div id="join-screen" class="glass-morphism rounded-2xl p-8 shadow-xl text-center max-w-md mx-auto my-10">
        <h2 class="text-2xl font-semibold mb-4">歡迎參賽</h2>
        <input type="text" id="username-input" placeholder="輸入你的姓名" class="w-full p-3 border-2 border-slate-200 rounded-lg mb-4 focus:border-indigo-500 outline-none">
        <button id="start-btn" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition">開始挑戰</button>
    </div>

    <div id="game-screen" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-6">
            <div id="challenge-box" class="bg-gradient-to-r from-indigo-500 to-purple-500 rounded-xl p-4 text-white shadow-md hidden">
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium opacity-90">🏃 追蹤挑戰：</span>
                    <span id="target-message" class="font-bold">距離前一名還差 0 分</span>
                </div>
            </div>

            <div class="glass-morphism rounded-2xl p-6 shadow-lg border border-white">
                <div class="flex justify-between items-end mb-4 border-b pb-2">
                    <div class="grid grid-cols-2 gap-x-6 gap-y-2 text-sm font-medium">
                        <span class="text-indigo-600 text-lg">總分: <span id="current-score" class="font-bold">0</span></span>
                        <span class="text-emerald-600 text-lg">速率: <span id="wpm-display" class="font-bold">0</span> <small>WPM</small></span>
                        <span class="text-slate-500">正確項數: <span id="correct-words">0</span></span>
                        <span class="text-orange-500">我的最高: <span id="personal-best">0</span></span>
                    </div>
                    <div id="timer" class="text-3xl font-mono font-bold text-red-500">--s</div>
                </div>
                
                <div id="text-display" class="bg-white p-6 rounded-xl border border-slate-100 min-h-[180px] mb-4 select-none"></div>
                <textarea id="hidden-input" autocomplete="off" class="w-full p-3 border-2 border-slate-100 rounded-lg focus:border-indigo-300 outline-none text-lg resize-none h-14" placeholder="在此處開始打字..."></textarea>
            </div>
        </div>

        <div class="glass-morphism rounded-2xl p-6 shadow-lg h-fit border border-white">
            <h3 class="text-xl font-bold mb-4 flex items-center gap-2">🏆 即時排行 (前 10 名)</h3>
            <div id="leaderboard-list" class="space-y-3">
                </div>
        </div>
    </div>

    <div id="admin-auth-panel" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm">
            <h2 class="text-xl font-bold mb-4">教師驗證</h2>
            <input type="password" id="admin-password-input" class="w-full p-3 border rounded-lg mb-4 outline-none" placeholder="輸入密碼">
            <div class="flex gap-3">
                <button id="confirm-auth" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg">確認</button>
                <button id="cancel-auth" class="flex-1 bg-slate-200 py-2 rounded-lg">取消</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-lg shadow-2xl">
            <h2 class="text-xl font-bold mb-4">全班題目設定</h2>
            <textarea id="admin-text-input" class="w-full h-40 p-3 border rounded-lg mb-4" placeholder="請輸入題目..."></textarea>
            <label class="block mb-2 text-sm text-slate-600">比賽時間 (秒)：</label>
            <input type="number" id="admin-time-input" value="60" class="w-full p-2 border rounded-lg mb-4">
            <div class="flex gap-3">
                <button id="save-config" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-bold">同步更新題目</button>
                <button id="close-admin" class="flex-1 bg-slate-200 py-2 rounded-lg">關閉</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, onSnapshot, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    // Firebase 配置 (請確保與你的專案一致)
    const firebaseConfig = {
        apiKey: "AIzaSyDGmJcE6A_gLVcMbmuCQTZ4Ny5eGKQ6bsw",
        authDomain: "school-4c9bf.firebaseapp.com",
        projectId: "school-4c9bf",
        storageBucket: "school-4c9bf.firebasestorage.app",
        messagingSenderId: "726465099395",
        appId: "1:726465099395:web:2143179e6fd8a919050db6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_PASSWORD = "teacher"; 
    let currentUser = null, targetText = "", gameTimeLimit = 60, timeLeft = 60;
    let timerInterval = null, isFinished = false, isComposing = false;
    let totalScore = 0, correctWordCount = 0, completedLoops = 0, personalBest = 0;

    const configDocRef = doc(db, 'competition', 'settings');
    const scoresColRef = collection(db, 'scores');

    function countWordsInString(str) {
        if (!str) return 0;
        const tokens = str.match(/[\u4e00-\u9fa5]|[a-zA-Z0-9]+|\n/g);
        return tokens ? tokens.length : 0;
    }

    function normalizeChar(char) {
        if (!char) return "";
        let c = char.charCodeAt(0);
        if (c >= 65281 && c <= 65374) char = String.fromCharCode(c - 65248);
        else if (c === 12288) char = " ";
        return char === '\r' ? '\n' : char;
    }

    async function init() {
        await signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                onSnapshot(configDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        targetText = data.text || "";
                        gameTimeLimit = data.duration || 60;
                        document.getElementById('room-status').textContent = `目標設定：${gameTimeLimit}秒`;
                        fullReset();
                    }
                });
                
                // 讀取較多排名資料以計算「前一名差距」，但顯示上限由 UI 控制
                const q = query(scoresColRef, orderBy("score", "desc"), limit(40));
                onSnapshot(q, (snapshot) => {
                    const scores = [];
                    snapshot.forEach(doc => {
                        scores.push({ id: doc.id, ...doc.data() });
                        if (doc.id === currentUser.uid) {
                            personalBest = doc.data().score || 0;
                            document.getElementById('personal-best').textContent = personalBest;
                        }
                    });
                    updateLeaderboardUI(scores);
                    updateChallengeTarget(scores);
                });
            }
        });
    }

    function fullReset() {
        totalScore = 0; correctWordCount = 0; completedLoops = 0; isFinished = false;
        timeLeft = gameTimeLimit;
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        updateUIStats();
        renderTextDisplay();
        const input = document.getElementById('hidden-input');
        input.value = ''; input.disabled = false;
    }

    function renderTextDisplay() {
        const display = document.getElementById('text-display');
        display.innerHTML = '';
        [...targetText].forEach((char, i) => {
            const span = document.createElement('span');
            span.id = `char-${i}`;
            if (char === '\n') {
                span.className = 'char pending newline';
                display.appendChild(span);
                display.appendChild(document.createElement('br'));
            } else {
                span.textContent = char; span.className = 'char pending';
                display.appendChild(span);
            }
        });
        if (display.firstChild) display.firstChild.classList.add('current');
    }

    function updateUIStats() {
        document.getElementById('current-score').textContent = totalScore;
        document.getElementById('correct-words').textContent = correctWordCount;
        document.getElementById('timer').textContent = `${timeLeft}s`;
        const timeElapsed = gameTimeLimit - timeLeft;
        if (timeElapsed > 0) {
            const wpm = Math.round((correctWordCount / timeElapsed) * 60);
            document.getElementById('wpm-display').textContent = wpm;
        }
    }

    // 更新「距離前一名還差多遠」的提示
    function updateChallengeTarget(scores) {
        const box = document.getElementById('challenge-box');
        const msg = document.getElementById('target-message');
        const myName = document.getElementById('username-input').value;
        
        if (!myName || scores.length < 2) {
            box.classList.add('hidden');
            return;
        }

        const myIndex = scores.findIndex(s => s.id === currentUser.uid);
        
        if (myIndex > 0) { // 如果我不是第一名
            const prevPlayer = scores[myIndex - 1];
            const diff = prevPlayer.score - totalScore;
            
            box.classList.remove('hidden');
            if (diff > 0) {
                msg.innerText = `距離前一名還差 ${diff} 分`;
            } else {
                msg.innerText = `太棒了！`;
            }
        } else if (myIndex === 0) { // 我是第一名
            box.classList.remove('hidden');
            msg.innerText = `🏆 你是目前的全班冠軍！保持領先！`;
        }
    }

    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            timeLeft--; updateUIStats();
            if (timeLeft <= 0) finishGame();
        }, 1000);
    }

    function processInput(inputValue) {
        if (isFinished || !targetText) return;
        if (!timerInterval && inputValue.length > 0) startTimer();

        let currentCorrectInThisLoop = "";
        const inputLen = inputValue.length;

        for (let i = 0; i < targetText.length; i++) {
            const span = document.getElementById(`char-${i}`);
            if (!span) continue;
            span.classList.remove('current');
            if (i < inputLen) {
                const typed = normalizeChar(inputValue[i]), target = normalizeChar(targetText[i]);
                if (typed === target) {
                    span.className = `char correct ${target === '\n' ? 'newline' : ''}`;
                    currentCorrectInThisLoop += targetText[i];
                } else {
                    span.className = `char incorrect ${target === '\n' ? 'newline' : ''}`;
                }
            } else {
                span.className = `char pending ${targetText[i] === '\n' ? 'newline' : ''}`;
            }
        }

        const wordsInCompleted = countWordsInString(targetText) * completedLoops;
        const wordsInCurrent = countWordsInString(currentCorrectInThisLoop);
        correctWordCount = wordsInCompleted + wordsInCurrent;
        totalScore = correctWordCount * 100;
        updateUIStats();

        if (inputLen >= targetText.length) {
            completedLoops++;
            document.getElementById('hidden-input').value = '';
            renderTextDisplay();
        } else {
            const nextSpan = document.getElementById(`char-${inputLen}`);
            if (nextSpan) nextSpan.classList.add('current');
        }
    }

    async function finishGame() {
        isFinished = true; clearInterval(timerInterval);
        document.getElementById('hidden-input').disabled = true;
        document.getElementById('timer').textContent = "結束！";
        
        if (totalScore > 0) {
            const username = document.getElementById('username-input').value || '匿名';
            await setDoc(doc(db, 'scores', currentUser.uid), {
                username, score: totalScore, words: correctWordCount, timestamp: serverTimestamp()
            });
            if (totalScore >= personalBest) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }
    }

    function updateLeaderboardUI(scores) {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = '';
        const myId = currentUser.uid;
        const myIndex = scores.findIndex(s => s.id === myId);

        // 繪製邏輯
        scores.forEach((data, index) => {
            // 條件：前 10 名，或者是「我本人」
            if (index < 10 || index === myIndex) {
                if (index === myIndex && index >= 10) {
                    const divider = document.createElement('div');
                    divider.className = "text-center text-slate-300 py-1";
                    divider.innerText = "⋮ (你在這裡) ⋮";
                    list.appendChild(divider);
                }

                const item = document.createElement('div');
                const isMe = data.id === myId;
                item.className = `flex items-center justify-between p-3 rounded-lg border shadow-sm transition-all ${isMe ? 'bg-indigo-50 border-indigo-400 my-rank-highlight' : 'bg-white border-slate-100'}`;
                
                item.innerHTML = `
                    <div class="flex items-center gap-3 truncate">
                        <span class="font-bold w-6 ${index < 3 ? 'text-amber-500' : 'text-slate-400'}">${index + 1}.</span>
                        <span class="font-medium truncate">${data.username} ${isMe ? '<small class="text-indigo-500">(你)</small>' : ''}</span>
                    </div>
                    <div class="text-right ml-2">
                        <div class="font-bold text-indigo-600">${data.score}</div>
                        <div class="text-[10px] text-slate-400">${data.words} 項</div>
                    </div>`;
                list.appendChild(item);
            }
        });
    }

    // 事件監聽
    document.getElementById('start-btn').addEventListener('click', () => {
        if (!document.getElementById('username-input').value.trim()) return alert('請輸入姓名');
        document.getElementById('join-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        renderTextDisplay();
        setTimeout(() => document.getElementById('hidden-input').focus(), 300);
    });

    const inputArea = document.getElementById('hidden-input');
    inputArea.addEventListener('compositionstart', () => isComposing = true);
    inputArea.addEventListener('compositionend', (e) => { isComposing = false; processInput(e.target.value); });
    inputArea.addEventListener('input', (e) => { if (!isComposing) processInput(e.target.value); });

    document.getElementById('admin-toggle').addEventListener('click', () => document.getElementById('admin-auth-panel').classList.remove('hidden'));
    document.getElementById('confirm-auth').addEventListener('click', () => {
        if (document.getElementById('admin-password-input').value === ADMIN_PASSWORD) {
            document.getElementById('admin-auth-panel').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('admin-text-input').value = targetText;
            document.getElementById('admin-time-input').value = gameTimeLimit;
        } else alert("密碼錯誤");
    });
    document.getElementById('save-config').addEventListener('click', async () => {
        const text = document.getElementById('admin-text-input').value.trim();
        const duration = parseInt(document.getElementById('admin-time-input').value);
        if (text && duration) {
            await setDoc(configDocRef, { text, duration });
            document.getElementById('admin-panel').classList.add('hidden');
        }
    });
    document.getElementById('cancel-auth').addEventListener('click', () => document.getElementById('admin-auth-panel').classList.add('hidden'));
    document.getElementById('close-admin').addEventListener('click', () => document.getElementById('admin-panel').classList.add('hidden'));

    init();
</script>
</body>
</html>
